# Space-nGrams Configuration
# Скопируйте этот файл в:
#   1. ./space-ngrams.toml (для конкретного проекта)
#   2. ~/.space-ngrams/config.toml (глобально для пользователя)

# ──────────────────────────────────────────────────────────────────────────────
# Кэширование
# ──────────────────────────────────────────────────────────────────────────────

[cache]
# Включить кэширование результатов поиска
enabled = true

# Время жизни кэша в секундах (5 минут)
ttl_seconds = 300

# Максимальный размер кэша в мегабайтах
max_size_mb = 50

# ──────────────────────────────────────────────────────────────────────────────
# Лимиты
# ──────────────────────────────────────────────────────────────────────────────

[limits]
# Максимальное количество результатов поиска
max_search_results = 50

# Максимальное количество результатов поиска файлов
max_files_results = 100

# Максимальное количество строк для чтения за один раз
max_read_lines = 200

# Количество строк контекста по умолчанию
default_context_lines = 2

# Таймаут поиска в секундах
search_timeout_seconds = 15

# ──────────────────────────────────────────────────────────────────────────────
# Игноры (дополнительно к .gitignore)
# ──────────────────────────────────────────────────────────────────────────────

# Глоб-паттерны файлов для игнорирования
ignore_patterns = [
    "*.log",
    "*.tmp",
    "*.bak",
    "node_modules/**",
    "__pycache__/**",
    ".git/**",
]

# ──────────────────────────────────────────────────────────────────────────────
# Метрики
# ──────────────────────────────────────────────────────────────────────────────

[metrics]
# Включить сбор метрик производительности
enabled = true
